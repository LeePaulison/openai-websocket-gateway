<!doctype html>
<html>
  <body>
    <button id="send">Send Message</button>

    <pre id="output"></pre>

    <script>
      const output = document.getElementById("output");

      const socket = new WebSocket("ws://localhost:8080");

      let isConnected = false;

      socket.addEventListener("open", () => {
        console.log("Connected");

        isConnected = true;

        output.textContent = "Connected\n";
      });

      socket.addEventListener("close", () => {
        isConnected = false;

        output.textContent += "\nDisconnected";
      });

      socket.addEventListener("error", (error) => {
        console.error(error);

        output.textContent += "\nSocket error";
      });

      socket.addEventListener("message", (event) => {
        const message = JSON.parse(event.data);

        switch (message.type) {
          case "stream:start":
            output.textContent = "";
            break;

          case "stream:delta":
            output.textContent += message.content;
            break;

          case "stream:end":
            output.textContent += "\n\n[done]";
            break;

          case "error":
            output.textContent += `\nERROR: ${message.message}`;
            break;
        }
      });

      document.getElementById("send").addEventListener("click", () => {
        if (!isConnected) {
          output.textContent += "\nSocket not connected yet";
          return;
        }

        socket.send(
          JSON.stringify({
            type: "chat:message",
            content: "Explain websocket streaming simply.",
          }),
        );
      });
    </script>
  </body>
</html>
