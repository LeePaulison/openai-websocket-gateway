type Message {
  role: String!
  content: String!
  createdAt: String!
}

type ConversationSummary {
  id: ID!
  updatedAt: String!
  preview: String
}

type Conversation {
  id: ID!
  userId: String!
  createdAt: String!
  updatedAt: String!
  messages: [Message!]!
}

extend type Query {
  conversations: [ConversationSummary!]!
  conversation(id: ID!): Conversation
}
